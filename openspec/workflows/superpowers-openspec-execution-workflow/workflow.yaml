name: superpowers-openspec-execution-workflow
type: orchestrator
standalone: false
description: Explore with Superpowers, lock behavior with OpenSpec, return to Superpowers for execution, then archive the OpenSpec change.
tool_support:
  - codex
  - cursor
  - claude-code
activation:
  mode: explicit-only
  triggers:
    - user-explicit-skill-name
    - user-explicit-workflow-request
    - repo-policy-explicit-requirement
dependencies:
  workflows:
    - superpowers-feature-workflow
    - openspec-feature-workflow
  external_skills:
    - openspec-archive-change
    - brainstorming
    - writing-plans
    - using-git-worktrees
    - test-driven-development
    - verification-before-completion
runtime_requirements:
  - openspec-cli
outputs:
  - docs/superpowers/specs/
  - docs/superpowers/plans/
  - openspec/changes/<change-name>/
  - .superpowers-memory/
  - scripts/run-superpowers-memory-closeout.ps1
  - scripts/validate-superpowers-memory.ps1
  - scripts/search-superpowers-memory.ps1
  - scripts/suggest-superpowers-memory-updates.ps1

name: superpowers-learning-workflow
type: workflow
standalone: true
description: Capture durable project knowledge, current state, session outcomes, and reusable lessons after meaningful work.
tool_support:
  - codex
  - cursor
  - claude-code
activation:
  mode: explicit-only
  triggers:
    - user-explicit-skill-name
    - user-explicit-workflow-request
    - repo-policy-explicit-requirement
dependencies:
  workflows: []
  external_skills: []
runtime_requirements: []
outputs:
  - .superpowers-memory/PROJECT_CONTEXT.md
  - .superpowers-memory/CURRENT_STATE.md
  - .superpowers-memory/DECISIONS.md
  - .superpowers-memory/KNOWN_FAILURES.md
  - .superpowers-memory/VERIFICATION_BASELINE.md
  - .superpowers-memory/TEAM_PREFERENCES.md
  - .superpowers-memory/USER_PROFILE.md
  - .superpowers-memory/AGENT_NOTES.md
  - .superpowers-memory/SESSION_CLOSE_CHECKLIST.md
  - .superpowers-memory/session-journal/
  - .superpowers-memory/LEARNING_BACKLOG.md
  - scripts/run-superpowers-memory-closeout.ps1
  - scripts/validate-superpowers-memory.ps1
  - scripts/search-superpowers-memory.ps1
  - scripts/suggest-superpowers-memory-updates.ps1
